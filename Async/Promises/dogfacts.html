<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        h1{
            font-size: large;
            font-family: 'Courier New', Courier, monospace;
            padding: 10px;
            border: 2px solid purple;
            background-color: pink;
            text-align: center;
            margin: 10px;
        }

        p{
            margin: 0 10px;
            padding: 10px;
            border: 1px solid purple;
        }

        button{
            background-color: blueviolet;
            color: white;
            margin: 10px;

        }
    </style>
</head>
<body>

    <h1>Get Dog Facts</h1>

    <p id="fact">Click the button to load a dog fact</p>

    <button onclick="showDogFact()">Get dog fact</button>
    
    <script>
        async function getDogFact(){
            const response = await fetch('https://dogapi.dog/api/v1/facts');
            
            const data = await response.json();

            return data


        }

        async function showDogFact(){
            const factDisplay = document.getElementById('fact');

            const fact =await getDogFact();

            factDisplay.textContent= fact.facts[0];
        }
    </script>
</body>
</html>
