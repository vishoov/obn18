    <title>Document</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background-color: #212121;
            display: flex;
        
        }
        .sidebar{
            width: 12.5vw;
            background-color: #181818;
            height: 100vh;
        }

        .topicons{
            display: flex;
            justify-content: space-between;
            padding: 15px;
            
        }

        .links{
            display: flex;
            flex-direction: column;
            padding-top: 20px;
            padding: 15px;

        }

        .link{
            padding: 10px 5px;
            text-decoration: none;
            font-family: Arial, Helvetica, sans-serif;
            font-size: 0.9rem;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            
        }

        .link:hover{
            background-color: rgba(77, 77, 77, 0.65);
        }

        .grow{
            min-height: 27%;

        }

        .banner{
            padding: 10px 25px;

            border-top: 2px solid rgba(128, 128, 128, 0.486);

        }

        .plans{
            padding: 15px;

        }

        .banner h2{
            font-size: 0.82rem;
            line-height: 2rem;
        }

        .banner p{
            font-size: 0.8rem;
            line-height:1.2rem;
            color: #acacac;
        }

        .btn{
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgb(98, 98, 98);
            border-radius: 20px;
            background-color: rgb(41, 41, 41);
            width: 100%;
            padding: 10px;
        }

        main{
            display: flex;
            flex-direction: column;
            padding: 20px;
            width: 100%;
        }

        .top{
            display: flex;
            justify-content: space-between;
            width: 100%;
        }

        .top-right{
            display: flex;
            height: auto;   
            gap: 5px;
            
        }


        .btn2{
            width: 280px;
        }

        .active{
            background-color: white;
            color: black;

        }

        .query{
            height: 100%;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 50px;
        }
        .query_in{
            width: 60%;
            background-color: grey;
            height: 10%;
        }
    </style>
