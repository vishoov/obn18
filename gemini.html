<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Gemini Chatbot</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .chat-container {
      width: 100%;
      max-width: 420px;
      height: 600px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .chat-header {
      background: #1a73e8;
      color: white;
      padding: 16px;
      font-size: 18px;
      font-weight: bold;
    }

    .chat-messages {
      flex: 1;
      padding: 16px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: #fafafa;
    }

    .message {
      padding: 10px 12px;
      border-radius: 10px;
      max-width: 80%;
      line-height: 1.4;
      white-space: pre-wrap;
    }

    .user {
      align-self: flex-end;
      background: #dbeafe;
    }

    .bot {
      align-self: flex-start;
      background: #e5e7eb;
    }

    .chat-input {
      display: flex;
      border-top: 1px solid #ddd;
      padding: 10px;
      gap: 8px;
      background: white;
    }

    .chat-input input {
      flex: 1;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 14px;
    }

    .chat-input button {
      padding: 10px 14px;
      border: none;
      background: #1a73e8;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .chat-input button:hover {
      background: #1558b0;
    }

    .chat-input button:disabled {
      background: #999;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">Gemini Chatbot</div>

    <div class="chat-messages" id="chatMessages">
      <div class="message bot">Hi! Ask me anything.</div>
    </div>

    <div class="chat-input">
      <input type="text" id="userInput" placeholder="Type a message..." />
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script>
    const API_KEY = "AQ.Ab8RN6IMnuYOyWkTrlgR8IMewRExklLw1fxIdNP3tMadxFhTgQ";
    // Use a Flash model (more stable under high demand)
    const MODEL = "gemini-2.5-flash";

    const chatMessages = document.getElementById("chatMessages");
    const userInput = document.getElementById("userInput");
    const sendBtn = document.getElementById("sendBtn");

    function addMessage(text, sender) {
      const div = document.createElement("div");
      div.className = `message ${sender}`;
      div.textContent = text;
      chatMessages.appendChild(div);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function callGemini(message) {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;

      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{ parts: [{ text: message }] }]
        })
      });

      const data = await response.json();

      if (data.error) {
        const error = data.error;
        throw {
          code: error.code,
          message: error.message || "API error"
        };
      }

      return data?.candidates?.[0]?.content?.parts?.[0]?.text || "Sorry, no response received.";
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage(message, "user");
      userInput.value = "";
      sendBtn.disabled = true;

      let reply;
      let attempt = 0;
      const maxAttempts = 2; // 1 original + 1 retry for 503

      try {
        while (attempt < maxAttempts) {
          attempt++;
          try {
            reply = await callGemini(message);
            break; // Success
          } catch (err) {
            if (err.code === 503 && attempt < maxAttempts) {
              // Retry after a short delay for high-demand 503
              addMessage("Model overloaded, retrying...", "bot");
              await new Promise(r => setTimeout(r, 2000));
              continue;
            }
            // Other errors or final attempt failed
            throw err;
          }
        }
      } catch (err) {
        reply = `Error: ${err.message}`;
      }

      // Remove "retrying..." message if it exists
      const lastBot = chatMessages.lastChild;
      if (lastBot && lastBot.textContent === "Model overloaded, retrying...") {
        chatMessages.removeChild(lastBot);
      }

      addMessage(reply, "bot");
      sendBtn.disabled = false;
      userInput.focus();
    }

    sendBtn.addEventListener("click", sendMessage);

    userInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
