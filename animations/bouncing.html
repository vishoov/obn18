<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            width: 100vw;
        }
        .ball{
            width: 50px;
            height: 50px;
            background-color: hotpink;
            border-radius: 50%;
            animation: bounce 1s infinite alternate ease-out;
        }

        @keyframes bounce{
            0%{
                transform: translateY(0);
                height: 50px;

            }
            50%{
                transform: translateY(-100px);
                height: 35px;

            }
            100%{
                transform: translateY(0);
                height: 50px;

            }
        }


    </style>
</head>
<body>
    <div class="ball"></div>
</body>
</html>
