    .box{

        height: 100px;
        width: 100px;
        border: 1px solid black;
        background-color: aliceblue;
    }

    #second{
        grid-row: 2/3;
        grid-column: 2/3;
        /* grid-area:2/2/3/3; */

    }

    #C{
        grid-column:3/4;
        grid-row:3/4
    }

    <div class="smaller" id="second">Second</div>
    <div class="smaller" id="C">C</div>

</div>
