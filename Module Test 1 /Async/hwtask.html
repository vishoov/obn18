<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harry Potter Books</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
            padding:30px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            color:#333;
        }

        .container{
            display:grid;
            grid-template-columns:repeat(3, 1fr);
            gap:15px;
            background: none;
        }

        .card{
            background:white;
            border-radius:12px;
            overflow:hidden;
        }

        .card img{
            width:100%;
            /* height:350px; */
        }

        .card-content{
            padding:15px;
        }

        .card-content h2{
            font-size:20px;
            margin-bottom:10px;
        }

        .card-content p{
            margin:6px 0;
            color:#555;
            line-height:1.5;
        }

        .loading{
            text-align:center;
            font-size:22px;
            color:#444;
        }
    </style>
</head>
<body>

    <h1>Harry Potter Books Collection</h1>

    <div id="booksContainer" class="container">
        <div class="loading">Thoda ruk jao😬</div>
    </div>

    <script>
        const container = document.getElementById("booksContainer");

        async function getBooks(){
            try{
                const response = await fetch("https://potterapi-fedeperin.vercel.app/en/books");
                
                const books = await response.json();

                container.innerHTML = "";

                books.forEach(book => {
                    const card = document.createElement("div");
                    card.classList.add("card");

                    card.innerHTML = `<img src="${book.cover}" alt="${book.title}">
                        
<div class="card-content">
<h2>Title: ${book.title}</h2>
                            <p><strong>Release Date:</strong> ${book.releaseDate}</p>

                            <p><strong>Pages:</strong> ${book.pages}</p>

                            <p><strong>Description:</strong> ${book.description}
                            </p>
                        </div>`;

                    container.appendChild(card);
                });

            } catch(error) {
                container.innerHTML = `
                    <h2 style="color:red;text-align:center;">Books nahin aayi🥺!</h2>`;
                console.error(error);
            }
        }

        getBooks();
    </script>

</body>
</html>
