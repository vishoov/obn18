<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Harry Potter Books</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    #status {
      text-align: center;
      color: #555;
    }

    #books {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .book-card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.08);
    }

    .book-card img {
      width: 100%;
      height: 320px;
      object-fit: cover;
      border-radius: 8px;
    }

    .book-card h2 {
      font-size: 18px;
      margin: 12px 0 8px;
    }

    .book-card p {
      font-size: 14px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>Harry Potter Books</h1>
  <p id="status">Loading books...</p>
  <div id="books"></div>

  <script>
    async function fetchBooks() {
      const booksContainer = document.getElementById("books");
      const status = document.getElementById("status");

      try {
        const response = await fetch("https://potterapi-fedeperin.vercel.app/en/books");

        if (!response.ok) {
          throw new Error("Failed to fetch books");
        }

        const books = await response.json();

        status.textContent = "";

        booksContainer.innerHTML = books.map(book => `
          <div class="book-card">
            <img src="${book.cover}" alt="${book.title} cover">
            <h2>${book.number}. ${book.title}</h2>
            <p><strong>Release Date:</strong> ${book.releaseDate}</p>
            <p><strong>Pages:</strong> ${book.pages}</p>
            <p>${book.description}</p>
          </div>
        `).join("");
      } catch (error) {
        status.textContent = "Could not load books.";
        console.error(error);
      }
    }

    fetchBooks();
  </script>
</body>
</html>
