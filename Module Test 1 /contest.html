    <h1>Contest dated 05/06/2026</h1>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        async function createUserAndPost(){
            try{
                const userCreate = await axios.post('https://jsonplaceholder.typicode.com/users', {
                    name:"John Doe",
                    email:"johndoe@example.com"
                })

                const userId = userCreate.data.id;

                const postCreate = await axios.post('https://jsonplaceholder.typicode.com/posts', {
                    userId:userId,
                    title:"Today I sleep",
                    body:"goodnight"
                });
                console.log(postCreate)
                const postId = postCreate.data.id;
                console.log(`Post created for user with userID: ${userId}, with postID: ${postId}`)

            }
            catch(e){
                console.error('Error:', e);

            }
        }

        createUserAndPost();


        async function getData(){
            const res = await fetch('https://jsonplaceholder.typicode.com/posts/1');

            const data = await res.json();
            console.log("Inside:", data);
            return data;
        }


let x = getData();
console.log("Outside:", x);

        
    </script>

</body>
